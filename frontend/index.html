<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Fórum Ječná</title>
  <meta name="description" content="Fórum Ječná – školní fórum pro diskuze, příspěvky a komentáře.">
  <link rel="stylesheet" href="./styles.css" />
  <script>
    // Apply theme before first paint (prevents "flash" on load)
    (function () {
      try {
        var t = localStorage.getItem('theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var isDark = (t === 'dark') || (!t && prefersDark);
        if (isDark) document.documentElement.classList.add('dark');
      } catch (e) {}
    })();
  </script>
</head>

<body>
<div class="forum-title">
  <h1>Fórum Ječná</h1>
  <p>Školní fórum pro studenty Ječná.</p>
</div>

  <header class="topbar">
    <div class="wrap topbar__inner">
      <a class="brand" href="#/"><span class="sr-only">Fórum Ječná</span></a>

      <nav class="nav">
        <a class="btn nav__btn" href="#/">📰 Příspěvky</a>
        <a class="btn nav__btn auth-only" href="#/new-post" style="display:none">➕ Nový příspěvek</a>
      </nav>

      <div class="auth">
        <span class="auth__status muted" id="authStatus">Nepřihlášen</span>
        <button class="btn" id="btnTheme" type="button" aria-label="Přepnout režim">🌙</button>
        <a class="btn" id="btnLoginLink" href="#/login">Přihlásit</a>
        <a class="btn" id="btnRegisterLink" href="#/register">Registrace</a>
        <button class="btn btn--danger" id="btnLogout" style="display:none">Odhlásit</button>
      </div>
    </div>
  </header>


  
  <main class="wrap">
    <div id="flash" class="flash" style="display:none"></div>
    <div id="app"></div>
  </main>

  <footer class="wrap footer muted">
    Pokud naleznete problém napište na support: hasek@spsejecna.cz
  </footer>

  <script type="module" src="./app.js"></script>
</body>
</html>
